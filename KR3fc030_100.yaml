body:
  text: 股弦得句物廣而方則以廣法定其對峙以逺法定其旁列物廣而圓則以廣法定其左右以逺法定其前浚物廣而髙用偃矩物廣而深用覆矩或上侈而下弇或頂歛而基恢或施平方或施立方或取其圍或取其徑因以等其重輕權其多寡是矩亦化而為𢖍化而為量也因形布算不能𥁞圖神而明之是在觧者姑列數則以槩其凡又曰物有廣而髙者有廣而深者或取直景或取倒景其法同者其逺同也故欲得廣先槩其廣自身所立䖏計之有左右俱可容矩直對者有一旁可直對一旁逺不可直對者有左右俱逺不可直對者廣之形量也左右可對一定直一定斜一旁可直對取直一旁不可直對取斜左右俱逺以身正對取直左右兩儘極處定斜求淂兩廣併之得一又廣有環向有背去有中圓外方中方外圓其形錯出難𥁞圖論要皆以上三法折之句弦求股法曰今為不可知之句弦求股廣作立髙求逺法先儘一旁取句立窺表用矩度測之淂倒景㡬何三率算之
