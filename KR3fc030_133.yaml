body:
  text: 六十六萬六千六百六十六尺六寸六分為至地尺寸以步法里法而一合問求夏至日高股例詳冬至兹不具爰是定其四率景較一率表度二率距較積實三率日下去地平四率景較二寸七分表度萬分距較積實一億四千四百萬尺改正曆考積實日下去地平五億三千三百三十三萬三千三百三十三尺三寸三分法以表度萬分乘距較積一億四千四百萬尺淂一兆四千四百億尺以景較二寸七分而一淂日下去地平五億三千三百三十三萬三千三百三十三尺三寸三分里尺法通之淂日下去地平二十九萬六千二百九十六里一百六步三尺三寸三分求夏至地平句爰是定其四率表度一率直景二率日高三率北南表至日下地平四率表度萬分
