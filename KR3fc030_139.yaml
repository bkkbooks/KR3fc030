body:
  text: 億八千八百八十八萬八千八百八十八尺八寸九分又以北表句一千五百六十一萬三千三百三十三尺三寸三分三釐二毫自之淂二百四十三京七千七百六十一兆七千七百七十七億三千六百一十四萬二千二百二十二尺二寸二分二釐四毫合股句積實共淂三千八十八京二千二百六兆二千一百二十八億二千五百三萬為北表人目至日高弦積實億分為尺下不用開方命之淂北弦逺五十五京五千七百一十七兆六千一百十億五千七百七十萬里尺法而一為三十萬八千七百二十二里百十步一尺寸分五釐七毫又以南表句一千五百二十五萬三千三百三十三尺三寸三分三釐二毫自之淂二百三十二京七千六百四十一兆四千七百二十六億七千四十四萬五千五百五十八尺二寸二分二釐四毫合股句積實共淂三千七十七京二千八十五兆九千七十七億五千九百三十三萬為南表人
