body:
  text: 檇李陳藎謨編平矩以正繩凡用測依繩木之定施于表矩斯大句股之形正方焉大句股之形𣣱矩度代受之過故法倚矩于窺表視其針無偏則表體直又從兩耳𢖍視之地無汚𨺚則相矩平于是始運矩凡立高測卑以高處取直為凖如上法在臺在山皆然居卑測高以相距之地取平為凖如木能平以矩度橫視之識其高處起高算次量所識以下高併上高淂全高如所識處不能至或不欲至則以相距數用測深法測下高併
