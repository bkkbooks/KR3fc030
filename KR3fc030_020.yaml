body:
  text: 號為文今作體代之止曰上下左右又下係之以圖藉以闡發奧義焉矩之形體正方內外皆可容圓始可立法曰既方之外者既成矩矣今乃折之是于方矩之外半其一矩也半其一矩者明非將矩折開為二止于方體之上從而界之界則分而為半矣方法雖邈焉無傳然泰西之埀線愚之易懸針皆此遺意也所謂半者不定屬之平分用于測量之時淂平分者每少或恆偏淂于上右或恆偏淂于下左于一矩之上兩半皆成等體何也如取之上右則右為句三上為股四徑隅為弦五而其所界出之形亦原其句三股四弦五之體何也上右既半于方之內矣而以其在下之形于既方之外引長其弦與股亦成三角形因而互換相觀與上右等形化下之長一非一字者為股化左之短丨非音袞字者為句而徑隅得弦合矩之半觀之如上右得句三股四弦五而左下得句三股四弦五也雖于矩體形殊而半于方之內者半于方之外者兩半各自相較合句股積淂弦
