body:
  text: 檇李陳藎謨編卧矩以知逺論曰前言深廣三測已具高而逺深而逺廣而逺之法今欲求逺而高逺而深逺而廣以極其致舉日天所臨目前共見共惘立法漫言之則以為克繆則以為無積不知上天日以逺而高逺而深逺而廣者昭昭示人可考也考之云何恃矩度之法在法立而天且不𨔻法立而人有所據愚蓋有𥩈取之矣載邢士登曆考取以為例其言曰北京立四丈表冬至日測淂正午景長七丈九尺八寸五分以凖繩于正南二千里同時測淂景長七丈九尺二寸四分問日下去地若干里答曰二萬六千二百二十九里一百八十二步小餘下原文三尺一寸一分當作四尺七寸五分四餘一術置表長四丈以步法五尺而一淂八步二表相距二千里以里法三百六十通之淂七十二萬步以表因之淂五百七十六萬步以步法因之淂二千八百八十萬尺為積實以二表景相較淂六寸一分為法除積實
