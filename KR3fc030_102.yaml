body:
  text: 淂距幾何自乘之淂句實幾何轉而斜對一旁取弦如前法淂倒景幾何三率算之淂距幾何自乘之得弦實幾何以句實除弦實餘幾何為股實平方開之淂股廣幾何以逺法為股弦求句同設有平疇隔溪橫列在南其形長方臨溪乘髙三十六尺儘東取句用窺表懸矩度測之淂倒景一十六分轉而向西取弦測淂倒景九分六六一六又自東旁測至平疇𥁞處得倒景五分溪濶幾何平疇廣幾何長幾何為𤱔步幾何法以表度二率乘立啇三率二十六尺加窺表共四十尺淂積實四千尺以句景一十六分分積實四千尺淂二百五十尺為溪濶自乘得六萬二千五百尺為句實以弦景九分六六一六分積實四千尺得四百一十四尺一不𥁞九毫八四為弦長自乘淂一十七萬一千四百四尺二八一為弦實以句實除弦實餘為股實一十萬八千九百四尺二八一平方開之淂股東西廣三百三十尺又以正南倒景五分分積實淂為長八百尺除溪濶二百五十尺餘為南北長五百五十
