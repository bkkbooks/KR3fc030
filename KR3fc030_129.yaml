body:
  text: 整整四方之數故開方取一邊數淂之盖大句之積自日下地至北表是從短而横長者大股之積自地平齊于日高是横長而從短者弦則不別有積合句股積為弦積是整整一斜方者開方一邊數是其斜方也又何疑焉句股既彰弦法斯見爰是定其四率開方一率日高句二率北南表股三率北南表弦四率開方十三啇兆分為尺日高句積實五垓五千七百二十六京九千五百五十一兆一千九百五十四億八千一百六十四萬四千七百一十九尺一寸六分一厘六毫北表股積實二十二垓二千七十二京六千九百九十八兆一千一百六十四億八千三百一十二萬六百六十六尺四寸八分八厘一毫合句股積實二十七垓七千七百九十九京六千五百四十九兆三千一百一十九億六千四百七十六萬五千三百八十五尺六寸四分九厘七毫南表股積實二十一垓八千六百九十二京六千八百九十三兆一千九百八十四億六千七百九十二萬六百六十五尺四寸八分八厘一毫合句股積實二十七垓四千四百一十九京六千四百四十四兆三千九百三十九億四千九百五十六萬五千四百八十四尺六寸四分九厘七毫
