body:
  text: 詮曰庖犧于周天曆度神智如此是與天地凖也天有晝夜上下地有南北高深邈乎䓪乎庖犧乃若升天度地者然請問數安從出心昧其機請問其目詮曰不可升不可度是必有數焉啇髙曰數之法出于圓方圓徑一而周三方徑一而匝四信圓之周而為句展方之匝而為股共結一角斜適弦五政圓方斜徑相通之率故曰數之法出于圓方圓方者天地之形隂陽之數然則周公之所問天地也是以啇高陳方圓之形以見其象因竒偶之數以制其法所謂言約指逺微妙幽通矣詮曰數者竒偶不齊之名法者統羣為一之術周公所問窮天極地之數也要有法焉庖犧仰觀俯察而淂之不由人造本乎天地之圓方圓出于方方出于股圓規之數理之以方方周匝也方正之物出之以矩矩
  hash: sha256:aca1ce39e8c8a72bce04153394108b02e9aa3bcd1dfdbad69c99afa70348c8e4
