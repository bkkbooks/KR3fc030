body:
  text: 以信隨時隨地據法可推令舉冬至之午又天全以曆法吿八曆法又全以此景淂正是為曆元推為逺抑末也學者從此進之可以知天可以知曆愚故諄諄以此為求逺例也所求日高大句也景較小句也相距日下地平大股也進二千里小股也以景較乘相距地小句乘大股也大股積實不可問横于二千里上小股之積實有可慿為積不同為高則同是以小股淂大句也葢變股以為句因横而淂從也又曰日下至地平之數少于地平相距之數則日髙大句也相距大股也自乘曰積實句自乘因從短而開方數少股自乘因横長而開方數多人目至日是為弦弦數無因因于句股合句股積為弦積開方益多于句股也弦又求逺之必從事者也今即以日景空中之弦為例而有形之物按實而求益可通矣或曰北表直景乘日高大句淂積實矣如求弦則必求積實以開方淂逺今求相距大股何以不用開方而取表度萬分之一也曰句短股長大句積實之形為長方取萬分長方之一邉即淂逺若求弦合句股積為積乃
