body:
  text: 天青黑地黃赤天數之為笠也青黑為表丹黃為裏以象天地之位既象其形又法其位言相方髏不亦似乎詮曰地以上至虛空之際皆天也以方出圓是從地淂天故寫天必藉寫地而以諸色別之寫天則以青黑寫地則以黃赤使天之為笠也所覆之中皆有數可考地上皆天原不可分強以青黑為表居其上丹黃為𥚃居其下以象天地之位如日高圖黃甲黃乙青丙青已等別為名號分為句股積實乘除以求天之曆度既明前法復據此圖思算焉不猶升階而定之哉是故知地者智知天者聖言天之高大地之廣逺自非聖智其孰能與于此乎詮曰凡此推測天地作用非聖智不能為之然天不可階升難以虛揣不容作為知天者大而化之之謂聖也知天必出于知地是以方出圓以智出聖也知地者據地以為典而創造表矩設立術數其聰明有大過人者非智不能也是故知地者智而知天者聖聖者何所庸其心哉人以為推測天地不過智者之事孰知聖亦不
