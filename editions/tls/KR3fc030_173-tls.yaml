body:
  text: 地者大氣舉之天中不啻㤗山于稊米其德則方其體則圜于月食闇虗可見然渾天大圜必有大方以綰兩極樞者在聖人六合之外存而不論其所存者何物也葢大方也西士亦已窺此其言九重天㝡上為宗動天方者静也圜者動也𥨸謂大動之圜有此大静之方以宗之雖不晰其形象亦稍淂其實理縁前舉髙深廣逺圜五法皆自淺至深自小至大圜法至于天已深極大極而不明于以方出圜啇高所言周公所詢徒虗語也且又何以冐前五者之理統前五者之法乎啇周之時止見葢天不知渾天然笠以寫天出笠之方無不同也于是明合矩矩言方方則有徑徑者矩之上下前後縱横也從有徑合横以為方從横有徑周六合以為方而立圜出于此矣立圜之徑即六合之徑也所以言合矩也言徑于天自漢劉𡽪以至今數千年未有畫一者以愚太極周徑術雖至億兆無有牽合以就整者天徑無微秒之忽所以載天徑者亦與之俱合也古人言天定一度字㝡為精玅人在大圜之中地球之上仰而視之目睛所至咫尺此圜度里步此圜度前人言每
