  text: 直景北表二尺九寸二分七厘五毫南表二尺八寸六分日下地平至北表一千五百六十一萬三千三百三十三尺三寸三分三厘二毫南表一千五百二十五萬三千三百三十三尺三寸三分三厘二毫法以北表直景二尺九寸二分七厘五毫乘日高五億三千三百三十三萬三千三百三十三尺三寸三分得積實一千五百六十一億三千三百三十三萬三千三百三十三尺三寸五分七厘五毫表度萬分而一淂一千五百六十一萬三千三百三十三尺三寸三分三厘二毫里尺法而一淂八萬六千七百四十里二百六十六步尺三寸三分三厘二毫為北表至日下地平相距逺數又以南表直景二尺八寸六分乘日高五億三千三百三十三萬三千三百三十三尺三寸三分淂積實一千五百二十五億三千三百三十二萬三千三百三十二尺三寸八分表度萬分而一淂一千五百二十五萬三千三百三十三尺三寸三分三厘二毫里尺法而一淂八萬四千七百四十里二十六步二尺三寸三分三厘二毫為南表至日下地平相距逺數
