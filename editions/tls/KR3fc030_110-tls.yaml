body:
  text: 以西嶺後距倒景一十二分一五五八互換直景八百二十二分六五西嶺前矩倒景一十三分五六九六互換直景七百三十六分九三六淂景較八十五分七一四以景較八十五分七一四為一率表度積矩十萬二率與進前距較一千八十尺三率相乘淂積實一億八百萬尺景較八十五分七一四分之得髙一千二百六十尺即以嶺髙作直景立髙測逺法以表度積矩萬分為一率後距直景八百二十二分六五二率與嶺髙一千二百六十尺三率相乘淂積實一億三百六十五萬三千九百尺表度分之淂西嶺地面斜至測所一萬三百六十五尺計五里二百七十三步景較下積矩八十五為百七為千一為萬四為十萬直景下積矩八百二十二萬百六為千五為萬以中嶺股長九千七百二十尺自之淂九千四百四十七萬八千四百尺為股積東嶺弦長一萬八十八尺三二六八自之淂一億一百七十六萬八千四百三尺為東嶺弦積
