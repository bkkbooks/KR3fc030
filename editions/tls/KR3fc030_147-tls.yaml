body:
  text: 南北弦開方籌算環矩以為圓啇高謂周公曰數之法出于圓方圓出于方方出于矩矩出于九九八十一又曰環矩以為圓圓葢難言哉毋論世人不知圓自古以迄今兹名公大人宛轉以定其法皆淂其近而不淂其合也愚反覆求之悉淂其合先辨定之然後可以言矩矩淂然後可以方方淂然後可言圓俾與後學先資焉數有弧矢算法此𨵿天日黃赤道出度之原無禆日用繁而難入算書少所載言者不數人荆川先生言句股測量
