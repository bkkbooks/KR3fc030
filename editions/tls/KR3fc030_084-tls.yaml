body:
  text: 乘算量徑靣數即物深數右矩度立表測深二法與前望高條相通不更設圖論以句求股法曰用矩度測深淂直景以直景為一率以表度二率與徑靣三率相乘淂積實直景分之淂物深四率設有井靣徑八尺用矩度測至井底對處淂直景一十六分法以表度乘面徑淂積實八百尺直景一十六分分之淂井深五十尺設立表測深有井靣徑八尺從井口退至六寸四分窺表参相直法以窺表乘井靣徑八尺淂積實三十二尺以退行六寸四分分之淂井深五十尺
