body:
  text: 檇李陳藎謨編平矩以正繩凢用測依繩木之定施于表矩斯大句股之形正方焉大句股之形𣣱矩度代受之過故法𠋣矩于窺表眡其針無偏則表體直又從兩耳𢖍眡之地無汚𨺚則相矩平于是始運矩凡立高測𤰞以高處取直為凖如上法在䑓在山皆然居𤰞測高以相距之地取平為凖如木能平以矩度横眡之識其高䖏起高算次量所識以下高併上高淂全高如所識處不能至或不欲至則以相距數用測深法測下高併
