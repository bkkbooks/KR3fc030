body:
  text: 自淂環矩以為圓合矩以為方既以追尋情理又可製造方圓詮曰此以下至以方出圓所以明製矩之原也夫矩器甚小何以一俯仰間即能淂天地之高深廣逺如此是本何道哉葢即従天地體上崇效𤰞法而淂之也今先從運矩䖏而求其形體有圓方二象存焉而此圓方二象又有大圓小圓大方小方存焉如上偃矩卧矩法從矩之上右角䖏掛于窺表目切于此或升而起或重而下則矩上尤角䖏環于虛空中成一圓象如覆矩則從矩之上左角處掛于窺表目切于此升埀一如前法亦環于虛空中成一圓象此所謂小圓也自目至所測之處于運矩淂小圓時彼所亦根矩度而成圓之象是小圓者也豈非環矩以始旣平
