body:
  text: 七分七七八即斜轉向東嶺界䖏測淂倒景一十九分六二七二一四進前一千八十尺測淂倒景二十一分九八三六一又従正對後距䖏斜轉向嶺西界測淂倒景一十二分一五五八進前一千八十尺測淂倒景一十三分六九六又従正對後距䖏乘髙一百七十六尺以窺表覆矩測至山麓淂倒景一十三分七九三總淂嶺中及東西界為髙廣逺各㡬何頂至山麓幾何共步𤱔㡬何方廣六尺植木為株㡬何法以中嶺前距倒景三十一分二五互換直景三百二十分中嶺後距倒景二十七分七七八互換直景三百六十分得景較四十分以景較四十分為一率表度積矩百分二率与退行距較一千八十尺三率相乘淂積實一十萬八百尺景較四十分分之淂髙二千七百尺直下地靣數即以嶺髙作直景立髙測逺法以表度積矩百分為一率後距直景三百六十分二
