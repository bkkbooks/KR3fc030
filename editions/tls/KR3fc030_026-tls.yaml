body:
  text: 十股八十弦百積矩萬可也更命為句六百股八百弦千積矩百萬可也仍不外句三股四弦五也通乎矩度而審此益見愚之不謬云故禹之所以治天下者此數之所生也禹治洪水䟽決江河望山川之形定高下之勢除㴞天之災釋昏墊之厄使東注于海而無浸溺乃句股之所由生也詮曰夫此積矩庖犠以之測天量地以定度數而造甲用固矣昔神禹之治洪水使地勢之高下道里之逺近無法悉知即地勢相阻拂高下之性昧先浚之施不知費幾何功力歳月焉能奠安其能治天下即此句股之數之所生也望之于天者人未能信施之于地者于今可覆而按也逺遡之禹益見數法之未可淺視矣周公曰大哉心逹數術之義故𤼲大哉之嘆詮曰大哉言數謂有本也謂其法本天地而還以之窮䆒天地非智者不能創之非巧者不能述之也請問用矩之道
