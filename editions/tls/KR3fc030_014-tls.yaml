body:
  text: 廣長也詮曰數雖並出于圓方然天體穹隆旋轉不己其圓難測湏藉定法以求之方者定法也淂此定法而浚冬夏之進退日月之盈縮皆有度可攷故曰圓出于方也此有定之方稍不平正奚以立法有物焉曰矩乃極方之體周匝不𣣱因以為方始有定法然後可以則天圓故曰方出于矩也矩出于九九八十一推方圓之率通廣長之數當湏乘除以計之九九者乘除之原也詮曰方旣出于矩矣矩之上列為度數然浚施于量天不啻登階而升施于量地不啻尺寸而度其法葢出于乘除九九者乘除之極故舉大以包小用此乘除以運矩而百千萬億之數天地無窮之變皆有以御之故折矩故者申事之詞也将為句股之率故曰折矩也詮曰矩旣定矣有乘除可推矣矩之立法何如于是将周匝極方之矩取中界而斜折之有短者焉有長者焉
