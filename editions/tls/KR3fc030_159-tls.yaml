body:
  text: 置𥘉啇五度以因上𤎉淂六萬七千一百四十度一一八七八二一一二五以减益從方餘一百四十八萬八千八百九十度五四五八九六六八五一二五三七五為從方置𥘉啇五度自之淂二十五度以减下𤎉餘五千五百三十七度二八八以𥘉啇五度因之淂三萬七千六百八十六度四四為從𤎉併從方共淂一百五十一萬六千五百七十六度五八九八九六六八五一二五三七五為下法除正實淂五度餘實一十五萬一千六百五十八度七三四二一五九三四三七三一二五置𥘉啇五度倍之淂十度加次啇十分共淂一十度一十分以乘上𤎉淂一十三萬五千六百二十三度三九九三九八六七二五以减益從方餘一百四十三萬四百七度六二四七三八九三三七五三七五為從方置𥘨啇五度一十分自之淂二十六度一分以加𥘉啇自之之數共淂五十一度一分以减下𤎉餘五千五百一十一度一十九分八十八秒以倍𥘨啇加次啇一
