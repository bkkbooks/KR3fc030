body:
  text: 以立髙測至山麓倒景一十三分七九三為一率表度積矩十萬二率乘之髙七百一十六尺加窺表共七百二十尺三率淂積實七千二百萬尺倒景一十三分七九三分之淂測所至山麓五千五百二十尺以除股長九千七百二十尺淂積下地面股長四千五百尺以嶺下股長四千五百尺自之淂股積二千二十五萬尺併句積一千八百六十六萬二千四百尺股積二千二十五萬尺為嶺峰至麓𡽹面弦積六千三百六十六萬二千四百尺開方得嶺長七千一百三十九尺以嶺廣六千三百尺乘嶺長七千一百三十九尺得積尺四千四百九十七萬五千七百尺為積步八百九十九萬五千一百四十步為𤱔三萬七千四百七十九𤱔一百八十步相懸六尺植木內除徑路濶六尺長七千一百三十九尺應植木七百四十九萬四千四百六十一株
