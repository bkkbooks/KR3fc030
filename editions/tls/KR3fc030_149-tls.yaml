body:
  text: 而不及弧矢篛溪先生言弧矢句股而不及測量今合而言之欲明圓先明圓之徑徑也者方也平圓立圓中心之徑也割平圓之旁状若弧矢其背曲曰弧背其弦直曰弧弦其中𢖍曰矢一一皆取法于徑也背有曲直弦有修短係于圓之小大圓大則徑長圓小則徑短非徑無以定之古法始于黃鐘律管古言黃鐘之管空圍九分徑三分遂言徑一圍三後儒舉徑圍先從黃鐘始且言圓徑一而周三方徑一而周四又從三四中講出許多大道理来不知周三徑一不足徑一周三有餘此其粗略也還原布算雖直下可淂不合也即善曆如郭守敬言天徑亦云一百二十一度七十五分二十五杪以此弧矢法測每日日行天度後人遵之何處向明眼人説㢤故徑一周三不及辨也辨後之革周三徑一而立法者一魏劉𡽪周徑術五十因一百五十七除五十因周天淂一萬八千二百六十二度八十七分五十秒一五七除之淂徑一百一十六度三十二分四十秒四十四微又以一五七乘之淂一萬八千二百六十二度八十七
