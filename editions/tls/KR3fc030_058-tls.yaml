body:
  text: 論曰句股法必用自乘何求其方也必求其方何問其積也積則句股弦共之故句有句積股有股積弦不別有積也弦不別有積故併句股淂弦積以弦積除句淂股除股淂句也萬有不齊之形方之斯凖于齊矩之斯凖于方凖于方斯可以求圓而天地日月之經緯定方者為法用圓者藏于矩不為法用也愚故以兩句兩股之謂矩一句一股木工曲尺不謂之矩也句三股四弦五不過舉小數以見積使人易明其理以通于散漫難收之数乃陳子答榮方之測日徑者曰日益表南晷日益長候句六尺無論其理尚煩宻測匪屬定論使必候句六尺以合于股八弦十過此上下豈不可以測日之徑圍乎矩度測量与立表測量運用𨿽分淂数則一皆自三法之積實出通乎斯術斯可與明度數之原矣
