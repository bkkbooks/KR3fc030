body:
  text: 重矩求高法曰以矩度測不知句股之高先淂直景㡬何如在倒景互換直景次退行㡬何再取直景如在倒景互換直景次以兩直景相减淂㡬何為景較一率以表度二率與退行距較三率相乘淂積實幾何景較一率分之淂表上物高四率加窺表淂全高即以表上物高作直景立高測逺法以表度為一率前距直景為二率與立高三率相乘淂積實㡬何以表度一率分之淂前距四率幾何互換圖法載後測深篇中設有隔溪峭𨐬不知其高臨溪用矩度測淂直景六十分八七退行一十四尺測得倒景八十八分四六一五峭壁高㡬何溪濶㡬何法以後距倒景八十八分四六一五互換淂直景一百一十三分四
