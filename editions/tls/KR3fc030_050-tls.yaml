body:
  text: 一率二率三率四率直景算表度直景度立高物廣逺倒景算倒景度表度立高物廣逺面徑測深一率二率三率四率重表算景較表度距較物深直景算直景度表度面徑物深倒景算表度倒景度面徑物深右重表算景較取倒景如在直景互換倒景埀針直下與物並直握矩望之則界矩靣為二啇高所謂折矩也互變相代總肖物形針在直景則物長于距上表為股比物高例直景為句比相距例針在倒景則距長于物左表為股比相距例倒景為句比物高例物長于距則物大股也距大句也表度與相距乘是化相距而十之也以直景之㡬何分之則十表度之淂景度幾何十相距之淂物高幾何見矣猶之曰上表小股也直景小句也小股與大句乘是化大句而十之也以小句之幾何分之則十小股之淂小句幾何十大股之淂大句幾何
