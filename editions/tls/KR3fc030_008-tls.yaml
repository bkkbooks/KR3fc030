body:
  text: 檇李陳藎謨編詮經經昔者周公問於啇高曰𥩈聞乎大夫善數也唐寅曰經文也注周公姓姬名旦武王之弟啇高周之賢大夫善算者也周公位居冢宰德則至高尚自𤰞已以自牧下學而上逹况其他乎唐寅曰此趙注也詮曰宋括蒼鮑澣之云周髀算經二卷古葢天之學也以句股之法度天地之高厚推日月之運行而得其度數其書出于啇周之間自周公受之于啇高周人志之謂之周髀次叚榮方問于陳子有曰周髀長八尺夏至之日晷一尺六寸髀者股也正晷者句也正南千里句一尺五寸正北千里句一尺七寸觀此則是髀者周土王之名也古言天体者三家一曰周髀二曰宣夜三曰渾天經云笠以寫天即盖天之學蔡邕以為考騐天象多所違失後世𠫵考俱宗渾天而周髀測景算天首法百世可師周公問數原自問天包犧知天本于知數下學上逹原非兩截周公𤼵端包犧啇高上遡神禹啇有
