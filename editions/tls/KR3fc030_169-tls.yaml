body:
  text: 差在半弧背二十四度內减之餘二十三度七七三七為黃道半弧弦又為黃赤道大句自之淂五百六十五度一八八八一一六九為弦𢌺置黃赤道小股自之淂一千三百三十五度六一九六一為股𢌺併弦𢌺共淂二千九百一九四九一三六五一平方開之淂五十三度八五三四為赤道小弦弧中以至黃道小句股隅置黃道半弧弦以半徑乘之淂一千三百七十七度四四四五一五四七五以赤道小弦而一淂二十五度五五七一為赤道半弧弦置黃赤道小股四十八度三二一九以乘半徑淂二千七百九十九度七五五一以赤道小弦而一得五十一度九八八四為赤道横大句在半徑內减之餘五度九五一二為赤道横弧矢自之淂三十五度四一六七八一四四以周天徑而一淂三十五分六十三秒為赤道背弦差加入半弧弦內共淂二十五度九十一分三十四秒為赤道積度較授時二十五度七十七分五十二秒今多一十三
