body:
  text: 又以南表股四億六千七百六十四萬五千九百一尺六寸三分九厘一毫自之淂股積實二十一垓八千六百九十二京六千八百九十三兆一千九百八十四億六千七百九十二萬六百六十五尺四寸八分八厘一毫合句股積實共二十七垓四千四百一十九京六千四百四十四兆三千九百三十九億四千九百五十六萬五千四百八十四尺六寸四分九厘七毫為南表人目至日高弦逺平方開之淂南弦逺五垓二千三百八十五京七百八十四兆五千五百四十三億里尺法而一為二十九萬一千二十八里七十六步四尺五寸五分四厘三毫又曆考之言曰北京立四𠀋表夏至日測淂景長一𠀋一尺七寸一分正南二千里景長一𠀋一尺四寸四分問曰下去地若千里荅曰五萬九千二百五十九里九十三步術置木長四𠀋以步法五尺而一淂八步以南北二表景相較淂二寸七分為法除前積實淂一億六百
