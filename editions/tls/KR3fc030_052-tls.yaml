body:
  text: 見矣故以直景為一率表度相距為二率三率也距長于物則距大股也物大句也倒景與相距乘既據倒景為十表度之㡬何因化相距為十物高之幾何也以表度之十分之不勞算而淂一矣猶之曰左表小股也倒景小句也小句與大股乘既據小句為十小股之幾何因化大句為十大股之幾何也以大股之十分之不勞算而淂一矣故以表度為一率倒景相距為二率三率也高深廣逺舉此可推詮原句股算立法多端相减曰較相併曰和句股相减為句股較句弦相减為句弦較股弦相减為股弦較句與股併為句股和句與弦併為句弦和股與弦併為股弦和弦與句股交併為弦較和弦與句股和併為弦和和弦與句股和相减為弦和較弦與句股較相减為弦較較錯綜為用更多名義然總以從横斜三法為原和較其支也施于矩度一以高深廣逺方圓收之去諸名義然昧其原莫淂矩度之觧故止本三法以竒零以凖不齊以資矩論句股求弦
