body:
  text: 論曰餘分者小分除之細至無窮終不能𥁞者也尺寸為寸寸下為分為毫𨤲絲忽微纎沙塵今小分餘數淂八以大數命之始合于法故曰六萬六千六百六十五之八十測高既淂四十八尺止則萬為寸于為分百為𨤲十為毫零為絲餘分八十言八十毫也存餘分者以𥁞算數無関增損高下大法在所棄去故總曰全高五十二尺若尺下命千則為寸寸下命萬則萬為分其直景倒景細分少差測近去之分寸測逺去之里步所宜審定與上不同後做此設立表測高相距二十八尺退行四尺窺表参相直法以除表乘二十八尺淂積實一百六十八尺以退行四尺除之淂四十二尺加立表淂全高五十二尺
