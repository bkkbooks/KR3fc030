body:
  text: 謂用表之宜測望之法詮曰以上推製矩之原立矩之法以下言其運用也前經文絕不言表浚叚榮方陳子條荅乃言立竿測景趙氏指出用表之宜盖用表與用矩法相𠋣輔或表不湏矩或矩不湏表亦可此言用矩之道似純用矩者泰西淂其遺法三代以来不知用矩之道矣愚意兩著之而數益宏偹啇高曰平矩以正繩以求繩之正定平懸之體将欲愼毫釐之差防千里之失詮曰此言奠矩之始事也矩則方方則平之而繩自直説詳後篇偃矩以望高覆矩以測深卧矩以知逺言施用無窮曲從其事術在九章詮曰三句言運矩以淂測量之術也偃自下而上覆自上而下卧漸𤰞而起不言廣者豈謂與逺同法耶然正南而極左右之廣則三法不足以該之愚故加弦矩以見廣句庶偹測量之法諸運矩設輪法詳載末篇䆒觀
