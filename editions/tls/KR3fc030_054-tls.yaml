body:
  text: 句自之淂九股自之淂十六并淂二十五為實開方淂弦五句弦求股句自之淂九弦自之淂二十五以句减弦淂較十六開方淂股四股弦求句股自之淂十六弦自之淂二十五以股减弦淂較九開方淂句三上三條為句股整法後衍竒零三法以通其餘句股求弦句三十六尺股四十七尺句自之淂一千二百九十六尺股自之淂五千二百九尺并淂三千五百五尺為實開方淂弦五十九尺不𥁞一千一百八十一分分之二十四
