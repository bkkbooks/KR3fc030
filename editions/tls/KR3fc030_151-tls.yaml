body:
  text: 分四十九秒八微又以五十除還原淂周天三百六十五度二十五分七十四秒九十八微一十六纎不及原一微八十四纎一宋祖冲之周徑宻術七因二十二除七因周天淂二千五百五十六度八十分二十五秒二十二除之淂徑一百一十六度二十一分八十二秒九十五微又二十二因淂二千五百五十六度八十分二十四秒九十微又七除還原淂三百六十五度二十五分七十四秒九十八微五十七纎不及原一微四十三纎一西人周徑術三一四一五九二以除周天淂徑一百一十六度二十六分五十秒九十微乘還原淂三百六十五度二十五分七十四秒七十六微六十二纎不及原二十三微三十七纎六七二一邢雲路徑圍相取皆三一二六為率以除周天淂徑一百一十六度八十四分五十秒九微
