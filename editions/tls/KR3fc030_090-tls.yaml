body:
  text: 之四百六十次以初測倒景七五分九四作二率乗溪面徑五十四尺徑積實四十一萬七十六尺表度一率積矩萬分分之淂溪深四十一尺餘分七𨤲六毫設登䑓臨溪不知其深臨䑓測至相對溪際淂直景四十三分八九五又登髙十尺測淂直景三十五分一九溪深㡬何濶㡬何法以下距直景四十三分八九五五換淂倒景二百二十七分八一二距直景三十五分二九互換淂倒景二百八十三分三六兩倒景相减淂景較一率五十五分五五以表度二率乗距較三率十尺淂積實一百尺景較一率五十五分五五分之淂溪面徑一十八尺餘分五千百三十五之一十次以下距倒景二百二十七分八一作一率乘溪面徑一十八尺
