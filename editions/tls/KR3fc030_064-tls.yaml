body:
  text: 設距所測十尺立表表浚退行六尺窺表参相直淂高二十尺法以表高减窺表餘六尺以乘表距十尺淂六十尺為積實以退行六尺爲法除之得高十尺加立表淂全高二十尺設表距所測十一尺退行六尺窺表参相直如前法乘表距淂五百四十尺為積實以退行六尺為法除之淂高九十尺加立表淂全高一百尺論曰所測表上之高大股也窺表减立表餘六尺小股也相距大句也退行六尺小句也句股平也小股乘距横于表間之積實小股乘大句也小句除積實從之為表外小句以上之積實小句淂大股也如前矩度法相距十六尺句股直景倒景皆同法今且以直景算之直景小句十度為一率表度小股十度為二率相距大句十六尺為三率以二率乘三率淂積實一百六十尺直景十度一率除之淂所測高十六尺為大股四率加窺表淂全高二十尺以前立表法通之小股表度十度乘大句相距十六
