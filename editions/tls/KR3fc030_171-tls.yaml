body:
  text: 分八十二秒顧箬溪應祥解曰弧矢状䫫句股淂直方之半故倍其積以股除之即淂句弧背曲倍積則長一弦而又一矢以矢乘積倍之恰淂一弦一矢之數因未知矢故以積自乘為實約天一度乘積以為上𤎉兩度乘徑以為下𤎉併之為法而浚可以淂矢用三乘者何也積本平方以積乘積是兩度平方矣故用三乘方法開之上𠔳下𠔳俱用四因者何也倍積則乘出之數為積者四故上下𠔳俱四以就之减徑者何也徑乃圍之全徑矢乃截去之句矢本减徑而淂故亦咸徑以求天五為角隅者何也凡平圜之積淂平方四之三在內者七五在外者二五不拘圜之大小每方一尺該虗隅二寸五分而其矢淂四四其虗隅淂一合而為五亦升實就法之意如不倍積𠔳不用四因以一二五為隅法亦通或不减徑作添積三乘方法亦通合矩以為方啇高曰方數為典以方出圜典實也以法也今九章之法實周公所問豈在置造方圜總從天地起見聖智超悟于言外又云圓出于方人所見大圜者天球固也指大方則以為地體不知
