body:
  text: 目至日高弦積實開方命之淂南弦逺五十五京四千七百二十五兆九千三百一十四億九千九百十九萬里尺法而一為三十萬八千一百八十一里二十六步一尺四寸九分九厘一毫或曰天日渺茫積算之夥無如弦帙亦既聞命矣𥩈有大疑焉日周天中大圜流轉句之逺股弦之逺今雖確有據乎其日下地之股二十餘萬里日高十三萬餘里安淂透入地中數萬里有竒而流轉耶曰斯疑言則誠有當也余言地平不言地上表以方淂景余亦以方淂日也然則如之何曰地德則方地體則圓于月食闇虛可證啇高言于周公曰圓出于方方出于矩則斯言𥁞之且子之言上下可指稱之乎曰日高為上二十餘萬里日下地為下曰非也或者茫然不知所云曰日之高為上日至人目為下或益茫然曰人目視日高句角為上日高直射人目為下世俗碍執上下二字不知地天吾身現附地球一邊也然則地球如之何曰昔人有言地厚三萬里圍九萬里余亦如子之疑而未實測也請
