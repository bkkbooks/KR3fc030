body:
  text: 十度一十分乘之淂五萬五千六百六十三度一七八八為從𤎉以併從方淂一百四十八萬六千百七十度七三二六一八九三三七五三七五為下法以除餘實淂一十分餘實三萬五百一十六度六九五四四一三三五五八七五置𥘨次啇五度一十分倍之淂一十度二十分再加三啇二分共淂一十度二十二分以乘上𤎉淂一十三萬七千二百三十四度四三七九六三七九五以減益從方餘一百四十一萬八千七百九十六度二六一八八八一五九六七五三七五為從方置𥘉次再啇五度一十二分自之淂二十六度二一四四再加𥘉次啇自之之數二十六度一分共淂五十二度二二四四以減下𠔳餘五千五百九度九八四四以倍𥘉次啇加再啇一十度二十二分乘之淂五萬六千三百一十二度四五六八為從𤎉以併從方共淂一百四十七萬五千一百一十六度六六七五六八一五九六七五三七五為下法以除次餘實淂二分餘再次餘實一千百一十四度二七六一八九五
