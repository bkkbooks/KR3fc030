body:
  text: 外乎此故曰以方出圓者以智出聖也智出于句句亦景也察句之損益加物之高逺故曰智出于句詮曰夫知天既由于知地而智之知地豈他求哉就實踐之地而求其里步以為句分廣衺者于此定逺近者于此智者之所知不能外焉豈非智出于句乎句出于矩矩謂之表表不移亦為句為句将正故曰句出于矩焉詮曰聖智所從事全藉乎句矣若句少差毫𨤲便差千里故欲淂句之極平必自極直求之無平矩以正繩之法句何可凖故曰句出于矩也夫矩之為物其裁制萬物惟所為耳言包含㡬微轉通旋環也詮曰矩以之測天量地斷然可以得周天曆度庖犧神聖其智亦不外此矩試以此法測物之高𤰞量物之廣逺猶有纎毫不可求纎毫不可𥁞者乎其裁制萬物惟所為耳周公曰善哉
