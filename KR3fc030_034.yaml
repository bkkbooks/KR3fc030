body:
  text: 夫體方則度景正形圓則審實難蓋方者有常而圓者多變故當制法而理之理之法者半周半徑相乘則淂方矣又可周徑相乘四而一又可徑自乘三而四之一又可周自乘十二而一故圓出于方典實也詮曰既從天圓地方淂矩度之體用然求之于天不能取其高大之數必從方矩二十有五之積實推表矩間所測之積實以為典焉是以地之廣逺為句修之以為股取地之方矣據地之方者為典則非虛泛而後天之運行與日月進退高下具足于矩度之內而高大之數無有不𥁞是天之大圓皆從矩之小方與句股之大方生出也所謂用矩之道如此笠以寫天笠亦如蓋其形正圓戴之所以象天寫猶象也言笠之體象天之形詩云何蓑何笠此之義也詮曰上既明製矩用矩之義而得其原于天矣然不為圖以彰之恐未能𥁞窺其法爰立為圖使人按而求之乃知前法之精確于是以天之穹隆者肖笠之形以寫之肖大圓之覆于上焉
