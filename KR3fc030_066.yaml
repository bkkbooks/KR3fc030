body:
  text: 尺横于表間之積實一百六十尺也小句直景十度除積實淂數十六尺從之為表外小句以上之積實小句淂大股也皆變句以為股因横而淂從者也然施之于用則表繁而矩簡槩可知焉以句求股法曰用矩度測高淂直景以直景為一率以表度二率與相距三率相乘淂積實直景除之淂物高四率設矩度測高相距三十二尺淂直景六十六分六𨤲六毫五絲法以表度乘相距淂積實三百二十尺直景六十六分六六五除這淂高四十八尺餘分六萬六千六百六十五之八十加窺表得全高五十二尺
