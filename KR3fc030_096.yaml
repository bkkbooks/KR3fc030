body:
  text: 所以不易也故兹立法以前矩度法通于立表用之凡不可知之句股欲求其從先求其橫既淂其橫始以可知之橫求不可知之從從深也如前法退行數短于窺表則從為股橫為句退行數長于窺表則從為句橫為股今求深也然不淂其濶則無因求深故先求濶濶橫也因從乃淂橫窺表為從可知者也兩窺表為兩從同長無因淂較故矩度求深必淂倒景為較遇直景必互換取倒景以生較焉矩度求髙必淂直景為較遇倒景必互換取直景以生較焉同一理也通于立表法亦必取窺表之從為句橫為股者斯兩從之較生如遇從為股橫為句者亦用互換法求之互換法窺表四尺命為百分則尺淂二十五分寸淂二十五𨤲已下更柝之已上則纍之窺表以百分命之是故其法與矩度同也又曰矩度立表二法既同觀前重表求髙之論可通重表求深之理矣然猶煩變換者其形殊也乃仍前論而轉之曰上表上矩之全積在重表重矩間者可見在下表下矩者仍不可見下表下矩近物而景短上表上矩逺物而景長長者全積也以其長者减其短者為景較
