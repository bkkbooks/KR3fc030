body:
  text: 上右角間亦如左角橫透以軸別植小表與目等高以右角背軸貫之而登降以就所測之高廣若測深逺者則以左角背軸貫之而登降以就所測之深逺詮法泰西立法以支干定矩度併以支干字行于論説蓋由西法純以心記不藉文字覽其書者非屬顯慧則按圖失論不能見圖循論失圖不能解論是作法不能使下智者窺也今槩去之止曰上下左右大句小句大股小股大弦小弦云舊法高逺命步千里今槩以尺寸總之欲命步則以尺之五欲命里則以步之三百六十舊術立表與今制矩度本同一法而矩度更簡捷如表高丈許非以繩附臬則差毫𨤲謬千里以測極高逺須愈高愈凖其求表直愈難携表隨行頗費人力且測量具大經濟或所測出于九天九地不若矩度俄頃靜成然知此法者或不及製矩度之器或器不及取而表可隨覔則立表法未可去且矩度曉有藉乎立表者故篇中圖論每以二法並臚或二法合舉相通則理益明法益備
