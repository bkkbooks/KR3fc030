body:
  text: 上右角間亦如左角横透以軸別植小表與目等高以右角背軸貫之而登降以就所測之高廣若測深逺者則以左角背軸貫之而登降以就所測之深逺詮法㤗西立法以支干定矩度併以支干字行于論説葢由西法純以心記不藉文字覧其書者非屬顯慧則按圖失論不能見圖循論失圖不能觧論是作法不能使下智者窺也今槩去之止曰上下左右大句小句大股小股大弦小弦云𦾔法高逺命步千里今槩以尺寸總之欲命步則以尺之五欲命里則以步之三百六十𦾔術立表與今制矩度本同一法而矩度更簡㨗如表高𠀋許非以繩附臬則差毫𨤲謬千里以測極高逺湏愈高愈凖其求表直愈难携表隨行頗費人力且測量具大經濟或所測出于九天九地不若矩度俄頃静成然知此法者或不及製矩度之器或器不及取而表可隨覔則立表法未可去且矩度曉有藉乎立表者故篇中圖論每以二法並臚或二法合舉相通則理益明法益備
