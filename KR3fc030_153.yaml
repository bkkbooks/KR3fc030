body:
  text: 乘還原淂三百六十五度二十五分七十四秒九十微不及原七微八十六纎六又邢雲路太一三才竒率三一二一二二三四以除周天淂徑一百一十七度二分一秒八十微乘還原淂三百六十五度二十五分七十四秒六十八微不及原三十一微七纎五五三八八䃤菴太極周徑術以周天七位外加太極一十微除淂徑一百一十五度八十七分九十三秒五十微淂八位餘四微八三二五乘還淂三百六十五度二十五分七十五秒原餘五微一六七五合二餘淂太極一十微不在內不在外太極者大圜天也天無度從日為度度之秒微在古今曆皆推移以就革不能一定是以凡算圜物一一肖天其周徑終不淂還原難算至數十百千九九終不淂破愚考古今周徑法有捷有迂有近有逺因創前法名太極徑周術淂其竅妙隨下合原雖諸家立術不齊運太極合原皆同也噫嘻物物一太極太極本無極物物不定太極亦無定隨舉一物斷然有定太極從何淂脫太極不能脫不在內
