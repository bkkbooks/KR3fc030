body:
  text: 矩以正繩己自立于至平至直之極淂矩之小方矣而自目以至相距之所如矩之平自目以極于所測高者自上而下深者自下而上又如矩之直合于矩之至平至直而不𠁊焉是于高深廣逺之所屇畫成一大方也豈非合矩以為方乎若夫製造圓方工人自有規矩在無煩周公下問也方屬地圓為天天圓地方物有圓方數有竒偶天動為圓其數竒地靜為方其數偶此配隂陽之義非實天地之體也天不可窮而見地不可𥁞而觀豈能定其方圓乎又曰北極之下高人所居六萬里滂沱四隤而下天之中央亦高四旁六萬里是為形狀同歸而不殊塗隆高齊耽而易以陳故曰天似蓋笠地法覆槃詮曰自上環矩合矩觀之所謂方者矩度自我踐履起是確然屬之地也所謂圓者矩度自我目至虛空處起是確然屬之天也又非僅屬之天地而已蓋一一肖天之圓肖地之方也言此以起下文從地淂天之意方數為典以方出圓
