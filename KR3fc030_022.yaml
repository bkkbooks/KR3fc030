body:
  text: 積分弦積得句股積無不同也其他取于測量者分數萬殊皆可䫫推矣愚故詮上句股徑隅而曰言三言四言五者雖具此數非屬一定尺寸之形也環而共盤淂成三四五盤讀如盤桓之盤言取而并减之積環曲而共盤之謂開方除其一靣故曰淂成三四五也此注謬詮曰業已明夫既方之外半其一矩矣而浚知半其一矩者豈分而為兩哉豈三四五之數有出入不齊者哉天下萬形𨿽殊持此矩環轉而求之為高為深為廣為逺無所不可𥁞𨿽半取方之內半取方之外總共此一盤之上淂成句三股四弦五也惟其共盤其形相等其數必等故淂成此三四五之數有條而不紊可以為法者非共盤則形既不同數亦錯出豈能淂成三四五哉兩矩共長二十有五是謂積矩兩矩者句股各自乘之實共長者并實之數將以施于萬事而此先陳其率也詮曰既于共盤一方之上折而半之成兩矩矣
