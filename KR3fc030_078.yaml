body:
  text: 餘二尺五寸八二為景較以景較二尺五寸八二除積實淂立表上高四十尺餘分二萬五千八百二十之二十八加立表淂全高五十尺再置表上高四十尺以乘前表距窺表四尺二寸淂積實一百六十八尺餘表分之淂溪濶二十八尺又總法以前距二十八尺併後距一十七尺二寸一八為相距四十五尺二寸一八餘表乘之淂積實二百七十一尺三寸八以後表退行六尺七寸八二分之淂立表上高四十尺餘分六萬七千八百二十之二十八加立表淂全高五十尺
