body:
  text: 岸處則迫于地故必退行立髙乃迎矩然退行可前可却𡸁針皆同但有髙卑耳若立表法如上設論必退至一十八尺窺表始參相直而矩度退至此處挂于窺表𡸁針終亦不移故總設一圖如上重矩求深法曰以矩度測不知句股之深先淂倒景幾何如在直景互換倒景次登髙幾何再取倒景如在直景互換倒景次以兩倒景相減得幾何為景較一率以表度二率與登髙距較三率相乘淂積實幾何景較分之淂面徑四率幾何次以面徑作倒景立卑測髙法以表度為一率下距倒景為二率與面徑三率相乘淂積實幾何表度分之淂物深四率幾何設登臺臨溪不知其深臨臺測至相對溪際淂倒景七十五分九四又登髙十尺測淂倒景九十四分四五溪深幾何濶幾何法以兩倒景相減淂景較一十八分五一以表度二率乘距較三率十尺淂積實一百尺景較一率分之淂溪面徑深五十四尺餘分一千八百五十一
