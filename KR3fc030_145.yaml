body:
  text: 俟异日或曰子言逺法至此無以加矣上下之説旣明地球之小可想北之望南軃重而下南之望北層累而上是地平指方日周乃圓出于方也且曆考言日高不言相距句股㡬何更不言人目至日高弦㡬何前所布列更無遺漏矣願從事于兹編凡開平方數少易罄數多更繁初學若從珠算開方之多如前者竟日不清省力省時莫妙籌算今列其法于卷末以便觀覧有此籌法化為寫法更隹也亦列後句股自之籌算
  hash: sha256:0f077beed70487a67b9d05b3ef0562e47aeeebfa332d945da4921e1579dc9aed
