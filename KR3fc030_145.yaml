body:
  text: 俟異日或曰子言逺法至此無以加矣上下之説既明地球之小可想北之望南軃重而下南之望北層纍而上是地平指方日周乃圓出于方也且曆考言日高不言相距句股幾何更不言人目至日高弦幾何前所布列更無遺漏矣願從事于兹編凡開平方數少易罄數多更繁初學若從珠算開方之多如前者竟日不清省力省時莫妙籌算今列其法于卷末以便觀覽有此籌法化為寫法更隹也亦列後句股自之籌算
  hash: sha256:b10b77139eb8cc1f0e1a7dff31646d35a031c9f7ca9ec42701e9c7a30de0ce9b
