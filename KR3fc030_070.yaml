body:
  text: 以股求句法曰用矩度測高淂倒景以表度為一率以倒景二率與相距三率相乘淂積實表度除之淂物髙四率設矩度測高相距五十二尺淂倒景五十三分八五法以倒景五十三分八五乘相距五十二尺淂積實二十八萬二十尺表度除之淂高二十八尺二𨤲加窺表淂全高三十二尺與立表圖互觀此省設立表測高相距四十尺八寸六分退行一十一尺一寸四分窺表參相直法以餘表乘四十尺八寸六分得積實二百四十五尺一寸六分以退行餘之淂高二十二尺餘分一千一百一十四之八加窺表淂全高三十二尺
