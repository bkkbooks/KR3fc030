body:
  text: 北表弦至日高開方淂五垓二千七百六京七千三十兆七千六百六十一億南表弦至日高開方淂五垓二千三百八十五京七百八十四兆五千五百四十三億法以日高句二億三千六百六萬五千五百七十三尺七寸七分四毫自之淂句積實五垓五千七百二十六京九千五百五十一兆一千九百五十四億八千一百六十四萬四千七百一十九尺一寸六分一厘六毫又以北表股四億七千一百二十四萬五千九百一尺六寸三分九厘一毫自之淂股積實二十二垓二千七十二京六千九百九十八兆一千一百六十四億八千三百一十二萬六百六十六尺四寸八分八厘一毫合句股積實共二十七垓七千七百九十九京六千五百四十九兆三千一百一十九億六千四百七十六萬五千三百八十五尺六寸四分九厘七毫爲北表人目至日高弦逺平方開之淂北弦逺五垓二千七百六京七千三十兆七千七百六十二億里尺法而一為二十九萬三千八百一十五里六步尺七寸七分六厘一毫
