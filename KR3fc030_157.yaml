body:
  text: 周天徑一百一十五度八十七分九十三秒五十微此即是整非前人去秒微以下就整者黃道內外半弧背二十四度授時所測就整黃赤道大弦五十七度九十三分九十六秒七十五微即半徑黃赤道弧矢五度一十二分一十三秒黃赤道大句黃赤道大股五十二度八十一分八十三秒七十五微問黃赤道內外二十四度為半弧背為矢若干答曰五度一十二分一十五秒術曰置半弧背自之淂五百七十六度為半弧算置周天徑自之淂一萬三千四百二十八度二三七五六四二二五為徑算又為上𤎉置徑算以半弧背算乘之淂七百七十三萬四千五百四十一度六八三六九九三六為正實置徑算以周天徑乘之淂一百一十五萬六千三十度六六四六七八七九七六二五三七五為益從方置周天徑倍半弧背淂四十八度為全弧背乘之淂五千五百六十二度二八八為下𤎉
