body:
  text: 所受之矣趙君𡖖名𤕤自叙依經為圖有曰渾天有靈憲之天蓋天有周髀之法靈憲乃張𢖍所作實後漢安順之世而甄鸞重述乃解釋君𡖖所注出于宇文周時以此推之𤕤之生其在魏晋之間乎請問古者庖犧立周天曆度庖犧三皇之一始畫八卦以啇高善數能通乎微妙逹乎無方無大不綜無幽不顯聞庖犧立周天曆度運章蔀之法易曰古者庖犧氏之王天下也仰則觀象于天俯則觀法于地此之謂也詮曰庖犧畫八卦因而重之為卦六十四為爻三百八十有四乾坤之䇿凡三百有六十當期之日其作甲曆本此實為萬世曆象之祖定歲時起于甲寅支干相配為十二辰六甲而天地周度者日周于天之數日周于天一寒一暑四時偹成萬物畢改是故攝提遷次青龍移辰謂之歲歲首至也月首朔也至朔同日謂之章同在日首謂之蔀夫天不可階而升地不可將尺寸而度邈乎懸廣無階可升蕩乎遐逺無度可量
