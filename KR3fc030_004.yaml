body:
  text: 武原門人劉師田百頓首𢰅凢觀此帙貴具全力鏡首入末始通全法一叚一句不能淂解凢觀此帙貴擴大目聞此知彼始悟經濟幾尺幾分無𨵿大用凢觀此帙𥘉畏難𧷤披閱三四如由大道旣洞其㫖踴躍欽仰凢觀此帙能去囂氣静則生朗專斯不惑守其矜浮斯學所拒凢習此學首精矩度上下左右一軌于式方圓不逾測至天地凢習此不貴自摸索自小而大自近而逺辨矩纎微乃稱聖智周髀算經云知地者智知天者聖凢習此學帝精算術矩淂其形算淂其数離則兩傷合之雙美凢習此學方駕前喆周髀開基法義繼闡載閎載顯度測兼焉
