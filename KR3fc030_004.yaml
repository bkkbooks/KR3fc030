body:
  text: 武原門人劉師田百頓首𢰅凡觀此帙貴具全力鏡首入末始通全法一假一句不能淂解凡觀此帙貴擴大目聞此知彼始悟經濟幾尺幾分無𨵿大用凡觀此帙𥘉畏難𧷤披閲三四如由大道既洞其㫖踴躍欽仰凡觀此帙能去囂氣靜則生朗專斯不惑守其矜浮斯學所拒凡習此學首精矩度上下左右一軌于式方圓不逾測至天地凡習此不貴自摸索自小而大自近而逺辨矩纎微乃稱聖智周髀算經云知地者智知天者聖凡習此學帝精算術矩淂其形算淂其數離則兩傷合之雙美凡習此學方駕前哲周髀開基法義繼闡載閎載顯度測兼焉
