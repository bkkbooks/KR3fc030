body:
  text: 然此兩矩原共一長必共立一積數然浚可施于量天測地用之不滯握于尺寸通于億萬也夫句三股四併之成弦實五則此兩矩所共之長取法之數為定法而開方之淂五五二十有五以此二十有五引伸環轉御乎無窮莫不據此為實而布之算法則此二十有五乃積實也以此矩測天地日月必自此處以至于天地日月之際淂其積實然浚能知其逺近度數之不齊使非矩先有積實將何法以測量天地日月之積實哉故此兩矩共長二十有五者是之謂積矩也有此積矩始可以測量天地日月取其積實而以九九乘除之數算之雖萬變不窮不外此矩定法為之所謂圓出于方方出于矩者如此所謂數之法出于圓方者如此𠫵觀于泰西立矩表法為十二自之淂百四十有四為積同此法也今愚更其法為十自之淂一百為積亦此法也然則何不守啇高所傳于周公者而以二十五立法乎曰測逺大者小分愈細淂度愈真故取天地成數以立法猶之句六股八弦十也收之則仍句三股四弦五矣淂分欲細豈僅命十命百即此定法而命為句六
