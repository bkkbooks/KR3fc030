body:
  text: 論曰一物之高逺舉之不能自見也以其無句股也折之則兩兩之則句股見以故股不能見股因設為句句不能見句因設為股句股具故弦上表矩立故小句股生物之自為句股有定形所設之句股無定形近物而景短物本句而成股逺物而景長物本股而成句度其洪纎者在境與物之互變相代也互變相代在矩表矣表矩立而橫有距積即從有景積以小從因大橫以大橫因小橫淂大從此為可見之句股言也測量言短長則彰言句股則礙故以大小從橫槩之若不可見之句股積實之未淂也重表重矩不淂全積淂表距間之積表距間之積逺于物距之積也凡表矩近物為積少表矩逺物為積多故既立一表矩已藏一橫積淂橫積之法于其中猶然是一物之高逺不能自見也是表矩近物為積少之言也逺之而更立一表矩則兩表矩間之積始見表矩間之積從前表矩藏積而漸益之此表矩逺物為積多之言也後表後矩之前積在重表重矩間
