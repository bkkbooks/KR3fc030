body:
  text: 度二千九百幾里步尺寸何異說夢度又法也萬法所出天徑一百一十五度八十七分九十三秒五十微見前圜徑條即大方之徑也以方徑自之淂一百三十四兆二千八百二億三千七百五十六度曰十二分二十五秒是為平方又以平方自之名三乘方淂一十五垓五千六百二京六百六十四兆六千七百八十七億九千七百六十二度五十三分七十五秒是為立方立方者所以綰兩極之樞軸而出大圜者也夫人者置神方圜之外眼大如簸箕心細如毫毛吾與之䆒周髀矣匪然者是編奚𨵿于大經濟徒為荒唐說鈴焉爾
