body:
  text: 率與嶺髙二千七百尺三率相乘淂積實九十七萬二十尺表度分之淂中嶺地靣至測所九十七百二十尺計五里一百四十四步以東嶺後距倒景一十九分六二七二一四互換直景五百九分四九六六東嶺前距倒景二十一分九八一一互換直景四百五十四分九五六六得景較五十四分五四以景較五十四分五四為一率表度積矩萬分二率與進前距較一千八十尺三率相乘淂積實一千八十萬尺景較五十四分五四分之淂髙一千九百八十尺即以嶺髙作直景立髙測逺法以表度積矩百萬為一率浚距直景五百九分四九六六二率與嶺髙一千九百八十尺三率相乘淂積實一百億八千八百二萬二千八百六十尺表度分之淂東嶺地靣斜至測所一萬八十八尺三二六八計五里二百一十六步景較下積矩五十四為百五為千四為萬直景下積矩五百九為百四為千九為萬六為十萬六為百萬
