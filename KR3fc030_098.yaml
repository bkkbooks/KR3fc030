body:
  text: 于長景中去其短為景較是于全積中去下表下矩之從積而餘上表上矩之從積有此上表上矩之從積可以互變而求上表上矩之横積矣上表上矩之横與下表下矩之横為積不同為廣同也是故其廣可問也既淂横廣即再以横廣因下表下矩之小從為其横積表用窺表百分矩用表度是以大横之積𡚖其大從之原積也是故其深可問也弦矩以見廣論曰周髀算經有平髙深逺方圓用矩法無廣法豈以逺為廣耶相直之廣是為逺與身相對而横亘者乃廣也𦾔有句股弦容方法必立表于彼而求餘表于此盖以淂方為廣術亦巧而拙矣測量法大都為不能至不欲至者設也無表求之術不窮乎茲立求廣法一以矩度為主又以重矩為主而兼有測髙測深測逺測方測圓開平方開立方諸法始完一廣法為術更繁為用更大矣夫何以言弦矩也弦矩者與物對峙以矩度髙法深法逺法求淂句股即以髙深逺法邢求横亘極䖏以定弦而廣法生焉物廣而近則句弦淂股物廣而逺則
