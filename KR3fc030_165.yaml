body:
  text: 度二四二五以乘上𠔳淂一十三萬七千五百三十六度五三三三二五一五七四五六二五以減益從方餘一百四十一萬八千四百九十四度一三一三五三六四一六九一二五為從方置𥘨次三四五啇五度一十二分一十五秒自之淂二十六度二二九七六二二五又加𥘨次三四啇自之之數二十六度二二四六四一共淂五十二度四五四四三二五以減下𤎉餘五千五百九度七五四三九六七五以𥘨次三四啇倍之再加五啇五共一十度二四二五乘之淂五萬六千四百三十三度六五九四八七一一八七五為從𤎉以併從方共淂一百四十七萬四千九百二十七度七九七六二三五二四四一二五以除四次餘實淂五秒又餘實一百二十九度三一八三一一一一九八六六九六五一五授時曆周天徑一百二十一度太用古法徑一圍三較太極密率多五度八十八分同前二十四度下矢度為四度八十四分八十二秒較今算少二十七分三十一秒
