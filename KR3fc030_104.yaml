body:
  text: 尺以長乘廣淂積尺一十八萬一千五百尺步法五尺歸之淂三萬六千三百步𤱔法二百四十步歸之為乎疇一百五十一𤱔二分五𨤲重矩句弦求句法曰為不可知之股弦求句廣作居卑求髙法先就正對取直依重矩求髙法得髙數即以髙數作立髙測逺法淂相距數為股長轉于左界亦以重矩得相距數為左弦以股自乘積除弦自乘積餘開方之為左廣轉于右界赤如前取右弦右廣併左右廣為句廣設有廣𡽹橫列在南中有徑路東近西逺東髙西卑欲計步𤱔遍植樹木以矩正對徑路測淂倒景三十一分二五退行一千八十尺測淂浚距倒景二十
