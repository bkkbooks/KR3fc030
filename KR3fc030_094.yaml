body:
  text: 四寸一一六窺表參相直溪深幾何濶幾何法以窺表四尺為百分則尺為二十五分下距退行六尺七寸五五八是為四十三分八九五互換窺表百分是為二百二十七分八一上距退行一尺四寸一一六是為三十二分二九互換窺表百分是為二百八十三分三六退行兩長相減得景較五十五分五五以窺表百分乘登髙距較十尺淂積實一百尺景較分之淂溪面徑實濶一十八尺次以下距退行二百二十七分八一乘實濶一十八尺淂積實四十一萬五十八尺窺表積實萬分分之淂溪深四十一尺餘分五𨤲八毫論曰用立表法求不知句股之深與立兩表求髙法相通然立於平地可前可𨚫若立髙求深必橫貫兩表上下求之兩表相去髙上立髙著足愈難重表求深古法
