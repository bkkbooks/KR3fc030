body:
  text: 邢士登新法周天徑一百一十六度八十四分五十秒就整用圓徑相取以三一二六為率尚餘周天度內三十微曰就整同前二十四度下矢度為五度五分八十秒較今算少六分三十三秒若云就整何以後法上𤎉下𤎉益從方從方從𤎉等小餘至十四五位亦可稍去之以就整耶圓之大小短長無一不取法于徑反從源頭細分處説就整耶從來曆法之踈首宜測驗考究者也問平弧背二十四度下赤道積度若干答曰二十五度九十一分三十四秒術曰置周天半徑五十七度九十三分九十六秒七十五微內減矢度五度一十二分一十五秒餘五十二度八十一分八十一秒七十五微為黃赤道小弦即黃赤道大股置黃赤道小弦與黃赤道大股相乘今同即自之淂二千七百九十九度七五九六一一三三六二五以半徑而一淂四十八度三二一九為黃赤道小股置矢度五度一十二分一十五秒自之淂二十六度二二九七以周天徑而一淂二十二分六三為黃赤道背弦
