body:
  text: 求夏至日高弦爰是定其四率開方一率日高股二率北南表句三率北南弦至日高四率開方日高股積實二千八百四十四京四千四百四十四兆四千三百五十億八千八百八十八萬八千八百八十九尺八寸九分北表句積實二百四十三京七千七百六十一兆七千七百七十一億三千六百一十四萬二千二百二十二尺二寸二分二釐四毫合股句積實三千八十八京二千二百六兆二千一百二十八億二千五百五萬二千一百一十一尺一寸一分二釐四毫南表句積實二百三十二京七千六百四十一兆四千七百二十六億七千四十四萬五千五百五十八尺二寸二分二釐四毫合股句積實三千七十七京二千八十五兆九千七千七億五千九百三十三萬四千四百四十四尺一寸一分一釐四毫北表弦至日高開方淂一京七千五百七十三兆三千三百三十八億三千六百四十七萬南表弦至日高開方淂一京七千五百四十一兆九千七百四十二億六千九十五萬法以日高股五億三千三百三十三萬三千三百三十三尺三寸三分自之淂二千八百四十四京四千四百四十四兆四千三百五十
