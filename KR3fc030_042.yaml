body:
  text: 也若遇高深廣逺目力能收足不可及則三者無一可知而立表法又窮古法用重表今法用重矩而景較距較生焉景較以見縱距較以見橫兩較者亦攝小句股之形象成大句股之比例也句股大端𥁞于此句股之數曰縱橫斜句股之理曰圓與方互換通分其在心目大哉言數周公豈欺我哉詮器泰西之有測量法義也實本周髀𦾔術而加詳焉器有矩度以十二為法自乘積實百四十有四周髀亦曰兩矩共長二十有五是謂積矩是蓋周髀以五為法也積矩者何言羃也羃者何大方之靣也立法十二無不可通然十二為乘十二為分不若夫十乘十十分十之簡捷也故今立法以十為度積矩之度百積矩之分千積矩之細分萬以至十萬百萬詳密至矣矩之體以工尺十有二寸為率大則倍之極高深極廣逺非大莫能𥁞其量已上則體重已下則分淆器體平方命曰合矩合矩者并兩句兩股以成器也上左兩𤎉以當長長恆為股右下兩𤎉以分度度恆為句上左
