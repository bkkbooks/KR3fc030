body:
  text: 不在外故曰無極也愚反覆求原而不淂忽若有啓令解者任用之可耳凡從周求徑周有幾位徑加多一位或末值空亦容再加一位從徑求周周容少徑一位多算總不關原原亦不收運太極則從周求徑還周原從徑求周還徑原非不有竒零不收無關于原歸于太極也未及還原棄竒零不收有𧇊于原矣古算至今皆如此是故不可不求之太極也又曰芥子納須彌愚視須彌甚小非小于芥子須彌本小地在天中且然視芥子甚大非大于須彌芥子本大芥子包括乎天地旋轉乎天地有形無形豈不大哉太極之謂也又曰五百人為旅有一主者在此一人精神箇箇灌到本是五百單一人説不淂五百單一人二千五百人之主亦作如是觀天子統萬民之主亦作如是觀北辰統三百六十五度二十五分七十五秒亦作如是觀北辰有形無形不在內不在外也不在內不在外愚偶淂之因定其名曰太極今以太極密率周弧矢推算大圜
