body:
  text: 法一千八百尺通之淂日下去地平一十三萬一千一百四十七里一百九十四步三尺七寸七分四毫論曰本題卧矩以知逺何以竟審夫高也凡求高而逺者偃矩可淂深而逺廣而逺者覆矩弦矩可淂今求逺之逺非從極高不淂也卧矩者從髙偃伏而測之也高極山顚高亦可限不從最高通之淂其近之逺不淂其逺之逺知夫逺之逺則凡逺皆近矣故舉前法以槩凡逺以明天日之上下焉爰是定其四率表度一率直景二率日高三率北南至日下地平四率表度萬分直景北表一十九尺九寸六分二釐五毫原景七丈九尺八寸五分以尺論則四倍今以四而一則尺與尺合南表一十九尺八寸一分原景七丈九尺二寸四分法同上日高二億三千六百六萬五千五百七十三尺七寸七分四毫日下地平至北表四億七千一百二十四萬五千九百一尺六寸三分九釐一毫至南表四億六千七百六十四萬五千九百一尺六寸三分九釐一毫法以北表直景一十九尺九寸六分二釐五毫乘日髙二億三千六百六萬五千五
