body:
  text: 善哉言明曉之意所為問一事而萬事逹詮曰啇高所言理明而法偹通幽而入微上遡庖犧下迄百世未有可逾此法者周公上假稱其大下假稱其善于言下洞徹天地矣右周髀算經首章徐玄扈曰凡九章句股之鼻祖甄鸞李淳風輩為之重釋頗明悉實為算術中古文第一愚按甄李重釋止趙君𨜮句股方圓圖而不及經俱爭柝其流耳原本在此不在彼也又曰至于啇高問答之後所謂榮方問于陳子者言日月天地之數則千古大愚也而亦有近理者數十語絶勝渾天家愚故揭首章及趙注詮之使學者遡矩度之本其來有自以證泰西立法之可據焉詮理萬形繁出圓以方圓斯縱橫斜之三體定所謂折矩以為句廣三股修四徑隅五者啇高遡庖犧而立義也句股求弦句弦求股股弦求句明兩則得一句求股弦股求弦句弦求句股明一不能以得兩古法立表以通其窮今用矩度以代立表表矩者攝小句股之形象成大句股之比例
