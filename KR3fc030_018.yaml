body:
  text: 自然相應之率徑直隅角也亦謂之弦詮曰取其斜者以為徑隅較之短者多二較之長者多一定其數為五不言弦而言徑隅者言折角以至于隅也言三言四言五者雖具此數非屬一定尺寸之形實于方矩之體折之為言必具句三股四弦五之數然後生乘除之法上文先呼起矩出于九九八十一下文故折矩四句始申明方矩之中有此乘除之原今算術乘除必言法實二字是故折矩以下至是謂積矩皆欲疏出積矩故層層指明之既方之外半其一矩句股之法先知二數然後推一見句股然後求弦先各自乘成其實實成勢化外乃變通故曰既方之外或并句股之實以求弦實之中乃求句股之分并實不正等更相取與互有所得故曰半其一矩其術句股各自乘三三如九四四一十六并為弦自乘之實二十五减句于弦為股之實一十六减股于弦為句之實九詮曰詞不能𥁞者藉圖以闡之今借字成圖以訓矩體古音方又圍國二音形與義皆合于矩泰西以支干為
