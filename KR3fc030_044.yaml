body:
  text: 角間為兩表之首橫透以軸是立矩極以掛懸針針者度之可從分也分度值其右曰直景值其下曰倒景表無定股修者以象股度無定句短者以象句懸針恆直以象弦𦾔繫埀線線多搖今掛懸針針易定也上𤎉綴兩耳耳竅通光前耳以代表後耳以當目與物相參參相直則弦定弦定而物與目之句股肖其形蓋以矩之上表合境物之弦斯矩之弦與境物之從者並峙境物從為股則直景之橫以當句境物從為句則左表之橫以當股故曰以修短為句股不以縱橫為句股也在器為小句股所測為大句股形相等也形相等則理與數無不等是故廣逺高深可坐而致矩之內體毁方而為圓信圓之周則成句矩之外體破圓而為方展方之匝則成股肖大圓大方四象之一也趙君𨜮曰體方則度景正形圓則審實難蓋方者有常而圓者多變故當制法而理之今此矩度𥁞方圓之法矣
