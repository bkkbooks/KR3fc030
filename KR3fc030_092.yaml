body:
  text: 淂積實四十一萬五十八尺表度一率積矩萬分分之淂溪深四十一尺餘分五𨤲八毫法曰用立表法測不知句股之深先識深之下際靣徑于立高之界當立表退行幾何窺表參相直又於立髙上加立表平立表為臺退行幾何于原識深之下際面徑窺表參相直皆取其退行長于窺表者立較如退行短于窺表用互換法取長立較兩長相减得較幾何為景較以窺表作百分與登髙立表距較相乘淂積實景較分之淂實濶幾何次以實濶作立表居𤰞測髙法以下距退行或互換退行與實濶相乘得積實幾何窺表百分分之得物深幾何設登臺臨溪不知其深臨臺測至相對溪際退行一尺七寸五五八窺表參相直又登高十尺退行一尺
