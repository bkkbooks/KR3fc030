body:
  text: 淂積實四十一萬五十八尺表度一率積矩萬分分之淂溪深四十一尺餘分五𨤲八毫法曰用立表法測不知句股之深先識深之下際靣徑于立高之界當立表退行㡬何窺表参相直又於立髙上加立表平立表為䑓退行㡬何于原識深之下際面徑窺表参相直皆取其退行長于窺表者立較如退行短于窺表用互換法取長立較兩長相减得較㡬何為景較以窺表作百分與登髙立表距較相乘淂積實景較分之淂實濶㡬何次以實濶作立表居𤰞測髙法以下距退行或互換退行與實濶相乗得積實㡬何窺表百分分之得物深幾何設登䑓臨溪不知其深臨䑓測至相對溪際退行一尺七寸五五八窺表參相直又登高十尺退行一尺
  hash: sha256:c66d26dba1d903074912acb704bfbfbcd28aabd52e61d469615e946d7bc3e598
