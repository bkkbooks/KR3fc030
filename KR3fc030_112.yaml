body:
  text: 股積減東嶺弦積餘七百二十九萬為東嶺廣積開方得二千七百尺為東嶺句廣以西嶺弦長一萬三百六十五尺三自之得一億七百四十三萬九千四百四十四尺九為西嶺弦積股積減西嶺弦積餘一千二百九十六萬一千四十四尺九為西嶺句積開方得三千六百尺為西嶺句廣以東句二千七百尺西句三千六百尺併之淂六千三百尺為嶺廣計三里一百八十步以中嶺髙二千七百尺東嶺髙一千九百八十尺相併共四千六百八十尺均之得東嶺髙二千三百四十尺以中嶺髙二千七百尺西嶺髙一千二百六十尺相併共三千九百六十尺均之淂西積髙一千九百八十尺以東積髙二千三百四十尺西積髙一千九百八十尺相併共四千三百二十尺均之淂嶺髙實積二千一百六十尺自之淂句積一千八百六十六萬二千四百尺
