body:
  text: 有斜至于隅者焉折如罄折曲折之謂言折成一句一股也既具一句一股即具一徑隅泰西謂之三角形方者謂之矩今先舉一句一股之形言之故云折矩即木工曲尺測量全藉方矩不藉曲尺不先指一句一股之理數則意不明下方既方之外以下始合兩句兩股而解合矩以為句廣三廣圓之周橫者謂之廣廣短也詮曰何以是折矩為哉聖人見得折矩之小中有無窮參伍錯綜妙用取其短者以為句較之長者少一較之斜者少二是其數為三但以短者謂之句可縱可橫不必橫者謂之廣股修四應方之匝從者謂之修修長也詮曰取其長者以為股較之短者多一較之斜者少一定其數為四但以長者謂之股亦可縱可橫不必縱者謂之修徑隅五
