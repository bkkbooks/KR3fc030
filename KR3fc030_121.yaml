body:
  text: 淂四千七百二十一萬三千一百一十四尺七寸五分為至地尺寸以步法里法而一合問右術以長表淂從音宗之逺今用矩度求合表長矩方何以合問因變表從矩焉法北表直景七𠀋九尺八寸五分南表直景七𠀋九尺二寸四分何以知其直景也表長景短是為倒景表短景長知為直景也表以長求長絲忽易稽旋轉難運矩以方淂方大圓忒高逺足慿是以據數施矩高逺同例爰是定其四率景較一率表度二率距較積實三率日下去地四率景較六寸一分表度萬分距較積實一億四千四百萬尺曆考作積實二千八百八十萬尺蓋多步法因之今正誤日下去地二億三千六百六萬五千五百七十三尺七十七分四毫法以表度萬分乘矩較積實一億四千四百萬尺淂一兆四千四百億分景較六寸一分而一淂日下去地平二億三千六百六萬五千五百七十三尺七寸七分四毫里尺
