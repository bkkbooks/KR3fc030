body:
  text: 凢立表貴長無定度是篇皆以十尺為法窺表以四尺為法矩度所懸亦曰窺表立表除窺表命其所餘六尺曰餘表凡所圖論皆曰立表曰餘表曰窺表不更標十尺四尺六尺之數啇高曰平矩以正繩偃矩以望高覆短以測深卧矩以知逺環矩以為圓合矩以為方六言足為句股要法而太及于廣也相直之廣即逺法横相對者謂之廣愚故益弦矩以知廣并前六言為後立法諸題詮算𦾔術句股或立一表或立重表参望既直開方命之今用矩度命三率法以代開方淂其四率以景測高以目測高加窺表淂全高一率二率三率四率重表算景較表度距較物高直景算直景度表度相距物高倒景算表度倒景度相距物高右重表算景較取直景如在倒景互換直景以高側景平地測逺地平測廣
