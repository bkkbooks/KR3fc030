body:
  text: 百七十三尺七寸七分四毫得積實四兆七千一百二十四億五千九百一萬六千三百九十一尺六寸一分表度萬分而一為四億七千一百二十四萬五千九百一尺六寸三分九厘一毫以里尺法而一為二十六萬一千八百三里一百步一尺六寸三分九厘一毫為北表至日下地平相距逺數又以南表直景一十九尺八寸一分乘日高二億三千六百六萬五千五百七十三尺七寸七分四厘得積實四兆六千七百六十四億五千九百一萬六千三百九十一尺六寸二分四𨤲表度萬分而一為四億六千七百六十四萬五千九百一尺六寸三分九厘一毫以法而一為二十五萬九千八百三里一百步一尺六寸三分九厘一毫為南表至日下地平相距逺數凡算里步尺尺乘步步乘里三截分求常法也除法用之垔歸步步歸尺停步求尺停里求步繁𤨏易訛今創名曰里尺法以一八歸之一千八百尺為里億萬立彰無多轉折論曰髙至日逺至日下地漫然無據也日表淂景亦人
