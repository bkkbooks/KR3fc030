body:
  text: 一六二三六七五置𥘨次三啇五度一十二分倍之淂一十度二十四分再加四啇一十秒共淂一十度二十四分一十秒以乘上𠔳淂一十三萬七千五百一十六度三九一二八九五二二八二二五以减益方餘一百四十一萬八千五百一十四度二七三三八九二七四八二八七五為從方置𥘉次三商五度一十二分自之淂二十六度二二四六四一又加𥘉次三啇自之之數二十六度二一四四六淂五十二度四三九四一以减下𠔳餘五千五百九度七六九七五九以倍𥘉次三啇加又啇一十度二十四分一十秒乘之淂五萬六千四百二十五度五五二一一九一九為從𤎉以併從方共淂一百四十七萬四千九百三十九度八二五四九一一九三八二八七五為下法除再次餘實淂一十秒餘再次餘實八百六十六度七八二二六五一四二九八七二一二五置𥘨次三四啇五度一二一倍之加又啇五秒共淂一十
