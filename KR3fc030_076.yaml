body:
  text: 法曰以立表求不知句股之高先立表退行以窺表參相直又從前表退行幾何立表又退行以窺表參相直以餘表乘兩立表距較為積實以兩窺表距立表數相减餘為景較以景較除積實淂立表上高加立表淂全高再置表上高乘前表距窺表數為積實仍以餘表除積實淂前表距物高相逺數又法再置距較乘前表距窺表數為積實仍以上景較除積實亦淂前表距物高相逺數又總法既淂前距併後距為浚表間相距數以餘表乘之為積實以浚表退行數分之淂表上立高加立表淂全高設有隔溪峭𨐬不知其高臨溪立表退行二尺四寸以窺表參相直又距前表十七尺二寸一八立表退行六尺七寸八二以窺表參相直峭𨐬高幾何溪濶幾何法以餘表乘兩立表距較十七尺二十一八淂一百三尺三寸八為積實兩窺表距兩立表數相减
