body:
  text: 者可見在前表前矩者仍不可見前表前矩近物而景短後表後矩逺物而景長長者全積也以其長者减其短者為景較于長景中减其短為景較是于全積中去前表前矩之横積而餘後表後矩間之横積有此後表後矩之横積可以互變而求後表後矩之從積矣後表後矩之從與前表前矩之從為積不同為高同也是故其高可問也既淂從高即再以後高因前表前矩之小横為其從積表用餘表矩用表度是以大從之積𡚖其大横之原積也是故其逺可問也故凢測量施于一表一矩者為用小施于重表重矩者為用大重表重矩之理明而句股義𥁞矣覆矩以測深句股相等法曰覆矩者以矩表前表向下視之少矩度測深用立高可上可下者移就埀針界于矩度平分處不必乘算量靣徑相距數即窺表下深數除窺表淂原深法曰以立表測深先淂徑靣㡬何以近身徑靣𥁞處當立表又退行㡬何以窺表参相直退行與窺表等不必
