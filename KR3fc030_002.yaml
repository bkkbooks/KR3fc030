body:
  text: 粵自黃帝命𨽾首作算數逮周官大日徒以鄉三物教萬民而數居一焉保氏掌諌王惡而飬國子以道教之六藝終曰九數九數者方田粟布衰分少廣啇功均輸方程盈朒句股也謨按九章參伍錯綜周無窮之變而句股尤竒奧其法肇見周髀周公受之啇髙以度天地推日月且曰禹之所以治天下者此數之所生也唐設算學博士督課試舉而周髀算有程國𥘉制科尚試算數後䆮厭薄焉握算不知縱橫必歸儒者奚問句股哉泰西來賔斯學始偹大方家多傳之徐玄扈先生有測量法義句股義是周髀者句股之經法義者句股之疏傳也然周髀篇首包舉道法趙注不能𥁞其微次假推測後世解經踈大難以合乎用泰西以支千名號為圖為文亦既詳顯而不耐讀者心以目迷掩卷庋閣以故通斯學者仍鮮焉謨爰撰茲編首詮算經次臚諸法合古今而淺言之出以已意發凡繪圖庶幾周髀大彰法義彌著以便有志經濟之習之者崇禎上章執徐歲之孟陬檇李陳藎謨獻可氏書于䃤菴䃤音肅又音篠
